; multiplayer-restore configuration.
; Drop this next to multiplayer_restore.asi in your game folder.

[server]
; Hostname or dotted-quad of the FESL server to redirect EA traffic to.
; The default points at the public Merc2Reborn relay run by loganw.
; Override only if you're hosting your own server (see
; https://github.com/loganw234/Mercenaries2 for setup notes).
ip = refesl.live

[compat]
; 1 = patch the b-version check to advertise a specific build version.
; 0 = leave the b-version check alone.
patch_bversion = 1

; The specific build version integer to advertise to the FESL server.
; Default: 1555000000
bversion = 1555000000

[debug]
; WARNING: Do not modify the settings below unless you are positive
; about what you are doing. These are toggles for individual hooks.
hook_dns = 1
patch_ca = 1
