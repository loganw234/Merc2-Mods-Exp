name: Release mods

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g. v1.3.0)'
        required: true

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install 32-bit MinGW cross-compiler
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-mingw-w64-i686 zip

      - name: Build all mods
        run: make

      - name: Package mods into zips
        run: |
          mkdir dist
          
          # Copy individual debug-overlay-DEV assets to dist/ and zip them
          cp mods/debug-overlay-DEV/debug_overlay_DEV.asi dist/
          cp mods/debug-overlay-DEV/debug_overlay_DEV.ini dist/
          zip -j dist/debug-overlay-DEV.zip dist/debug_overlay_DEV.asi dist/debug_overlay_DEV.ini
          
          # Copy individual multiplayer-restore-DEV assets to dist/ and zip them
          cp mods/multiplayer-restore-DEV/multiplayer_restore_DEV.asi dist/
          cp mods/multiplayer-restore-DEV/multiplayer_restore_DEV.ini dist/
          zip -j dist/multiplayer-restore-DEV.zip dist/multiplayer_restore_DEV.asi dist/multiplayer_restore_DEV.ini
          
          # Stage and package lua-bridge with its folders
          mkdir -p dist/lua-bridge-pkg/OnBoot
          mkdir -p dist/lua-bridge-pkg/OnLoad
          mkdir -p dist/lua-bridge-pkg/OnKey
          
          cp mods/lua-bridge-DEV/lua_bridge_DEV.asi dist/
          cp mods/lua-bridge-DEV/lua_bridge_DEV.ini dist/
          cp mods/lua-bridge-DEV/lua_loader.ini dist/
          cp mods/lua-bridge-DEV/lua_console.py dist/
          
          cp mods/lua-bridge-DEV/lua_bridge_DEV.asi dist/lua-bridge-pkg/
          cp mods/lua-bridge-DEV/lua_bridge_DEV.ini dist/lua-bridge-pkg/
          cp mods/lua-bridge-DEV/lua_loader.ini dist/lua-bridge-pkg/
          cp mods/lua-bridge-DEV/lua_console.py dist/lua-bridge-pkg/
          cp mods/lua-bridge-DEV/scripts/OnBoot/print_boot.lua dist/lua-bridge-pkg/OnBoot/
          cp mods/lua-bridge-DEV/scripts/OnLoad/print_load.lua dist/lua-bridge-pkg/OnLoad/
          cp mods/lua-bridge-DEV/scripts/OnKey/test_key.lua dist/lua-bridge-pkg/OnKey/
          cp mods/lua-bridge-DEV/scripts/OnKey/perf_monitor.lua dist/lua-bridge-pkg/OnKey/
          
          cd dist/lua-bridge-pkg
          zip -r ../lua-bridge-DEV.zip .
          cd ../..
          rm -rf dist/lua-bridge-pkg

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name || inputs.tag }}
          name: ${{ github.ref_name || inputs.tag }}
          generate_release_notes: true
          files: |
            dist/*.zip
            dist/*.asi
            dist/*.ini
            dist/*.py
