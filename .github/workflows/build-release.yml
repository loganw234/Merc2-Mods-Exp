name: Build and attach ASI mods to release

on:
  push:
    tags:
      - 'v*'
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install 32-bit MinGW cross-compiler
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-mingw-w64-i686

      - name: Build all mods
        run: make -C mod-ports/mercs2-qol-mods

      - name: Collect built .asi files (and any companion .ini configs)
        run: |
          mkdir -p dist
          cp mod-ports/mercs2-qol-mods/mods/*/*.asi dist/
          cp mod-ports/mercs2-qol-mods/mods/*/*.ini dist/ 2>/dev/null || true
          ls -la dist

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: asi-mods
          path: dist/*

      - name: Attach .asi files to release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
